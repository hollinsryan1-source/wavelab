                    updateDelay();
                },
                (v) => {
                    state.reverbMix = parseFloat(v.toFixed(2));
                    updateReverb();
                },
                'Delay', 'Reverb', '#c084fc'
            );
            delayReverbDiv.appendChild(drPad);
            controlsContainer.appendChild(delayReverbDiv);

            // Octave up/down control
            const octaveCtrl = document.getElementById('octave-control');
            const octUpBtn = document.createElement('button');
            octUpBtn.innerHTML = '&#9650;';
            octUpBtn.className = 'w-10 h-10 rounded-lg flex items-center justify-center text-lg font-bold transition-all hover:scale-110 active:scale-95';
            octUpBtn.style.cssText = 'background: rgba(56,189,248,0.15); color: #38bdf8; border: 1px solid rgba(56,189,248,0.3);';
            octUpBtn.addEventListener('click', () => { if (state.octave < 7) { state.octave++; render(); } });
            const octLabel = document.createElement('div');
            octLabel.className = 'text-center';
            octLabel.innerHTML = `<div style="font-size:1.5rem; font-weight:700; color:#38bdf8;">${state.octave}</div><div style="font-size:0.6rem; color:#64748b; text-transform:uppercase; letter-spacing:0.05em;">Oct</div>`;
            const octDownBtn = document.createElement('button');
            octDownBtn.innerHTML = '&#9660;';
            octDownBtn.className = 'w-10 h-10 rounded-lg flex items-center justify-center text-lg font-bold transition-all hover:scale-110 active:scale-95';
            octDownBtn.style.cssText = 'background: rgba(56,189,248,0.15); color: #38bdf8; border: 1px solid rgba(56,189,248,0.3);';
            octDownBtn.addEventListener('click', () => { if (state.octave > 1) { state.octave--; render(); } });
            octaveCtrl.appendChild(octUpBtn);
            octaveCtrl.appendChild(octLabel);
            octaveCtrl.appendChild(octDownBtn);

            // Piano keys — 2 octaves + 1
            const pianoContainer = document.getElementById('piano-keys');
            const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

            const totalKeys = 25; // 2 full octaves + high C
            for (let i = 0; i < totalKeys; i++) {
                const noteIdx = i % 12;
                const n = NOTE_NAMES[noteIdx];
                const octaveOffset = Math.floor(i / 12);
                const oct = state.octave + octaveOffset;
                const note = n + oct;
                const isBlack = n.includes('#');

                const btn = document.createElement('button');
                btn.className = `piano-key ${isBlack ? 'black' : 'white'}`;
                btn.dataset.pianoNote = note;
                if (state.activeNotes.has(note)) btn.classList.add('active');

                const noteName = document.createElement('span');
                noteName.style.cssText = `position:absolute; bottom:0.375rem; left:50%; transform:translateX(-50%); font-size:0.55rem; font-family:monospace; color:${isBlack ? '#94a3b8' : '#64748b'};`;
                noteName.textContent = n;
                btn.appendChild(noteName);

                btn.addEventListener('mousedown', () => playNote(note));
                btn.addEventListener('mouseup', () => stopNote(note));
                btn.addEventListener('mouseleave', () => {
                    if (state.activeNotes.has(note)) stopNote(note);
                });
                // Touch support for mobile
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    playNote(note);
                }, { passive: false });
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    stopNote(note);
                }, { passive: false });
                btn.addEventListener('touchcancel', () => stopNote(note));

                pianoContainer.appendChild(btn);
            }

            // Start chord ring canvas animation
            startChordCanvas();

            // Pattern bank
            const patternBankContainer = document.getElementById('pattern-bank');
            const slots = ['A', 'B', 'C', 'D'];
            slots.forEach(slot => {
                const hasData = state.patternBank[slot] !== null;
                const isActive = state.patternSlot === slot;

                const wrapper = document.createElement('div');
                wrapper.className = 'flex items-center gap-0.5';

                // Load button (slot letter)
                const loadBtn = document.createElement('button');
                loadBtn.className = `px-2.5 py-1 text-xs font-bold rounded-l-lg transition-all ${
                    isActive
                        ? 'text-white border border-purple-500/60'
                        : hasData
                            ? 'text-purple-300 border border-purple-500/30 hover:border-purple-500/50'
                            : 'text-slate-600 border border-slate-700/40 hover:text-slate-400'
                }`;
                loadBtn.style.background = isActive ? 'rgba(168,85,247,0.25)' : hasData ? 'rgba(168,85,247,0.08)' : '';
                loadBtn.textContent = slot;
                loadBtn.addEventListener('click', () => {
                    if (hasData) loadPattern(slot);
                });

                // Save button
                const saveBtn = document.createElement('button');
                saveBtn.className = 'px-1.5 py-1 text-xs rounded-r-lg transition-all border border-l-0 hover:text-purple-300';
                saveBtn.style.borderColor = isActive ? 'rgba(168,85,247,0.6)' : hasData ? 'rgba(168,85,247,0.3)' : 'rgba(51,65,85,0.4)';
                saveBtn.style.color = '#94a3b8';
                saveBtn.textContent = '💾';
                saveBtn.title = 'Save current patterns to slot ' + slot;
                saveBtn.addEventListener('click', () => savePattern(slot));

                wrapper.appendChild(loadBtn);
                wrapper.appendChild(saveBtn);
                patternBankContainer.appendChild(wrapper);
            });

            // Step sequencer
            const seqContainer = document.getElementById('sequencer');
            const seqDiv = document.createElement('div');

            const seqControls = document.createElement('div');
            seqControls.className = 'flex items-center gap-3 mb-2';

            const playStopBtn = document.createElement('button');
            playStopBtn.className = `px-4 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                state.seqRunning
                    ? 'bg-red-500/20 text-red-400 border border-red-500/40'
                    : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/40'
            }`;
            playStopBtn.textContent = state.seqRunning ? 'Stop' : 'Play';
            playStopBtn.addEventListener('click', startStopSequencer);
            seqControls.appendChild(playStopBtn);

            const bpmLabel = document.createElement('span');
            bpmLabel.className = 'text-xs text-slate-400';
            bpmLabel.textContent = 'BPM';

            const bpmInput = document.createElement('input');
            bpmInput.type = 'range';
            bpmInput.min = 60;
            bpmInput.max = 200;
            bpmInput.value = state.bpm;
            bpmInput.className = 'w-20';
            bpmInput.style.accentColor = '#38bdf8';
            bpmInput.addEventListener('change', (e) => {
                state.bpm = Number(e.target.value);
                if (state.seqRunning) {
                    clearInterval(state.seqInterval);
                    let step = state.currentStep >= 0 ? state.currentStep : 0;
                    state.seqInterval = setInterval(() => {
                        step = (step + 1) % state.gridSteps;
                        state.currentStep = step;
                        if (audio.synth) {
                            const notes = [];
                            state.grid.forEach((row, ri) => {
                                if (row[step]) notes.push(state.gridNotes[state.gridNotes.length - 1 - ri] + state.octave);
                            });
                            if (notes.length > 0) {
                                audio.synth.triggerAttackRelease(notes, '16n');
                            }
                        }
                        updateStepIndicators();
                    }, (60 / state.bpm) * 1000 / 4);
                }
                // Also update drum tempo
                if (state.drumPlaying) {
                    clearInterval(state.drumInterval);
                    let dstep = state.drumStep >= 0 ? state.drumStep : 0;
                    state.drumInterval = setInterval(() => {
                        dstep = (dstep + 1) % state.gridSteps;
                        state.drumStep = dstep;
                        state.isPlaying = true;
                        state.drumParts.forEach((part, ri) => {
                            if (state.drumGrid[ri][dstep]) audio.drums[part].trigger();
                        });
                        updateStepIndicators();
                    }, (60 / state.bpm) * 1000 / 4);
                }
                // Also update bass tempo
                if (state.bassPlaying) {
                    clearInterval(state.bassInterval);
                    let bstep = state.bassStep >= 0 ? state.bassStep : 0;
                    state.bassInterval = setInterval(() => {
                        bstep = (bstep + 1) % state.gridSteps;
                        state.bassStep = bstep;
                        state.isPlaying = true;
                        state.bassNotes.forEach((note, ri) => {
                            if (state.bassGrid[ri][bstep]) {
                                audio.bassSynth.triggerAttackRelease(note + state.bassOctave, '16n', Tone.now());
                            }
                        });
                        updateStepIndicators();
                    }, (60 / state.bpm) * 1000 / 4);
                }
                render();
            });

            const bpmValue = document.createElement('span');
            bpmValue.className = 'text-xs font-mono text-slate-300 w-8';
            bpmValue.textContent = state.bpm;

            const bpmContainer = document.createElement('div');
            bpmContainer.className = 'flex items-center gap-2';
            bpmContainer.appendChild(bpmLabel);
            bpmContainer.appendChild(bpmInput);
            bpmContainer.appendChild(bpmValue);
            seqControls.appendChild(bpmContainer);

            const clearBtn = document.createElement('button');
            clearBtn.className = 'px-3 py-1.5 rounded-lg text-xs text-slate-400 bg-slate-800/60 border border-slate-700/50 hover:bg-slate-700/60';
            clearBtn.textContent = 'Clear';
            clearBtn.addEventListener('click', () => { clearGrid(); render(); });
            seqControls.appendChild(clearBtn);

            const randomBtn = document.createElement('button');
            randomBtn.className = 'px-3 py-1.5 rounded-lg text-xs text-purple-400 bg-purple-500/10 border border-purple-500/30 hover:bg-purple-500/20';
            randomBtn.textContent = 'Randomize';
            randomBtn.addEventListener('click', () => { randomizeGrid(); render(); });
            seqControls.appendChild(randomBtn);

            seqDiv.appendChild(seqControls);

            const gridContainer = document.createElement('div');
            gridContainer.className = 'flex gap-px';

            const noteLabelDiv = document.createElement('div');
            noteLabelDiv.className = 'flex flex-col gap-px mr-1';
            [...state.gridNotes].reverse().forEach((n) => {
                const isSharp = n.includes('#');
                const label = document.createElement('div');
                label.className = 'h-5 flex items-center justify-end pr-1';
                label.innerHTML = `<span class="text-xs font-mono" style="color: ${isSharp ? '#818cf8' : '#64748b'};">${n}</span>`;
                noteLabelDiv.appendChild(label);
            });
            gridContainer.appendChild(noteLabelDiv);

            for (let col = 0; col < state.gridSteps; col++) {
                const colDiv = document.createElement('div');
                colDiv.className = 'flex flex-col gap-px flex-1';
                for (let row = 0; row < state.gridNotes.length; row++) {
                    const cell = document.createElement('button');
                    cell.className = 'h-5 rounded-sm';
                    cell.dataset.seqCell = '1';
                    cell.dataset.seqRow = row;
                    cell.dataset.seqCol = col;
                    const isActive = state.grid[row][col];
                    const isCurrent = state.currentStep === col && state.seqRunning;
                    const noteForRow = state.gridNotes[state.gridNotes.length - 1 - row];
                    const isSharpRow = noteForRow && noteForRow.includes('#');
                    const inactiveBg = isSharpRow ? '#131b2e' : '#0f172a';
                    cell.style.background = isActive
                        ? isCurrent ? '#38bdf8' : '#6366f1'
                        : isCurrent ? '#1e293b' : inactiveBg;
                    cell.style.border = `1px solid ${isCurrent ? '#38bdf844' : '#1e293b'}`;
                    cell.style.boxShadow = isActive && isCurrent ? '0 0 8px #38bdf888' : 'none';
                    cell.addEventListener('click', () => { toggleGridCell(row, col); });
                    colDiv.appendChild(cell);
                }
                gridContainer.appendChild(colDiv);
            }

            seqDiv.appendChild(gridContainer);
            seqContainer.appendChild(seqDiv);

            // Drum machine
            const drumContainer = document.getElementById('drum-machine');
            if (drumContainer && state.drumGrid) {
                const drumDiv = document.createElement('div');

                // Controls row
                const drumControls = document.createElement('div');
                drumControls.className = 'flex items-center gap-3 mb-2 flex-wrap';

                // Play/Stop
                const drumPlayBtn = document.createElement('button');
                drumPlayBtn.className = `px-4 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                    state.drumPlaying
                        ? 'bg-red-500/20 text-red-400 border border-red-500/40'
                        : 'text-orange-400 border border-orange-500/40'
                }`;
                drumPlayBtn.style.background = state.drumPlaying ? '' : 'rgba(249,115,22,0.15)';
                drumPlayBtn.textContent = state.drumPlaying ? 'Stop' : 'Play Drums';
                drumPlayBtn.addEventListener('click', startStopDrums);
                drumControls.appendChild(drumPlayBtn);

                // Volume
                const volLabel = document.createElement('span');
                volLabel.className = 'text-xs text-slate-400';
                volLabel.textContent = 'Vol';
                const volInput = document.createElement('input');
                volInput.type = 'range';
                volInput.min = -30;
                volInput.max = 0;
                volInput.value = state.drumVolume;
                volInput.className = 'w-16';
                volInput.style.accentColor = '#fb923c';
                volInput.addEventListener('input', (e) => {
                    updateDrumVolume(Number(e.target.value));
                });
                const volContainer = document.createElement('div');
                volContainer.className = 'flex items-center gap-1.5';
                volContainer.appendChild(volLabel);
                volContainer.appendChild(volInput);
                drumControls.appendChild(volContainer);

                // Separator
                const sep = document.createElement('div');
                sep.className = 'w-px h-4 bg-slate-700';
                drumControls.appendChild(sep);

                // Pattern presets
                const patternLabel = document.createElement('span');
                patternLabel.className = 'text-xs text-slate-400';
                patternLabel.textContent = 'Pattern:';
                drumControls.appendChild(patternLabel);

                Object.keys(DRUM_PRESETS).forEach(name => {
                    const btn = document.createElement('button');
                    btn.className = `px-2.5 py-1 text-xs rounded-lg transition-all ${
                        state.drumPattern === name
                            ? 'text-orange-300 border border-orange-500/50'
                            : 'text-slate-400 border border-slate-700/50 hover:bg-slate-700/60'
                    }`;
                    btn.style.background = state.drumPattern === name ? 'rgba(249,115,22,0.2)' : 'rgba(30,41,59,0.6)';
                    btn.textContent = name;
                    btn.addEventListener('click', () => loadDrumPreset(name));
                    drumControls.appendChild(btn);
                });

                drumDiv.appendChild(drumControls);

                // Grid
                const drumGridEl = document.createElement('div');
                drumGridEl.className = 'flex gap-px';

                // Part labels
                const partLabels = document.createElement('div');
                partLabels.className = 'flex flex-col gap-px mr-1';
                state.drumParts.forEach(part => {
                    const lbl = document.createElement('div');
                    lbl.className = 'h-6 flex items-center justify-end pr-1.5';
                    const partColors = { Kick: '#fb923c', Snare: '#fbbf24', HiHat: '#a3e635', OpenHH: '#34d399', Clap: '#c084fc', Tom: '#f472b6' };
                    lbl.innerHTML = `<span class="text-xs font-mono" style="color:${partColors[part] || '#94a3b8'}">${part}</span>`;
                    partLabels.appendChild(lbl);
                });
                drumGridEl.appendChild(partLabels);

                // Cells
                const partColors = { Kick: '#fb923c', Snare: '#fbbf24', HiHat: '#a3e635', OpenHH: '#34d399', Clap: '#c084fc', Tom: '#f472b6' };
                for (let col = 0; col < state.gridSteps; col++) {
                    const colDiv = document.createElement('div');
                    colDiv.className = 'flex flex-col gap-px flex-1';
                    for (let row = 0; row < state.drumParts.length; row++) {
                        const cell = document.createElement('button');
                        cell.className = 'h-6 rounded-sm';
                        cell.dataset.drumCell = '1';
                        cell.dataset.drumRow = row;
                        cell.dataset.drumCol = col;
                        const isActive = state.drumGrid[row][col];
                        const isCurrent = state.drumStep === col && state.drumPlaying;
                        const color = partColors[state.drumParts[row]] || '#fb923c';
                        cell.style.background = isActive
                            ? isCurrent ? color : color + '88'
                            : isCurrent ? '#1e293b' : '#0f172a';
                        cell.style.border = `1px solid ${isCurrent ? color + '44' : '#1e293b'}`;
                        cell.style.boxShadow = isActive && isCurrent ? `0 0 8px ${color}88` : 'none';
                        cell.addEventListener('click', () => toggleDrumCell(row, col));
                        colDiv.appendChild(cell);
                    }
                    drumGridEl.appendChild(colDiv);
                }

                drumDiv.appendChild(drumGridEl);
                drumContainer.appendChild(drumDiv);
            }

            // Bass machine
            const bassContainer = document.getElementById('bass-machine');
            if (bassContainer && state.bassGrid) {
                const bassDiv = document.createElement('div');

                // Controls row
                const bassControls = document.createElement('div');
                bassControls.className = 'flex items-center gap-3 mb-2 flex-wrap';

                // Play/Stop
                const bassPlayBtn = document.createElement('button');
                bassPlayBtn.className = `px-4 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                    state.bassPlaying
                        ? 'bg-red-500/20 text-red-400 border border-red-500/40'
                        : 'text-emerald-400 border border-emerald-500/40'
                }`;
                bassPlayBtn.style.background = state.bassPlaying ? '' : 'rgba(16,185,129,0.15)';
                bassPlayBtn.textContent = state.bassPlaying ? 'Stop' : 'Play Bass';
                bassPlayBtn.addEventListener('click', startStopBass);
                bassControls.appendChild(bassPlayBtn);

                // Volume
                const bVolLabel = document.createElement('span');
                bVolLabel.className = 'text-xs text-slate-400';
                bVolLabel.textContent = 'Vol';
                const bVolInput = document.createElement('input');
                bVolInput.type = 'range';
                bVolInput.min = -30;
                bVolInput.max = 0;
                bVolInput.value = state.bassVolume;
                bVolInput.className = 'w-16';
                bVolInput.style.accentColor = '#10b981';
                bVolInput.addEventListener('input', (e) => {
                    updateBassVolume(Number(e.target.value));
                });
                const bVolContainer = document.createElement('div');
                bVolContainer.className = 'flex items-center gap-1.5';
                bVolContainer.appendChild(bVolLabel);
                bVolContainer.appendChild(bVolInput);
                bassControls.appendChild(bVolContainer);

                // Separator
                const bSep1 = document.createElement('div');
                bSep1.className = 'w-px h-4 bg-slate-700';
                bassControls.appendChild(bSep1);

                // Waveform selector
                const waveLabel = document.createElement('span');
                waveLabel.className = 'text-xs text-slate-400';
                waveLabel.textContent = 'Wave:';
                bassControls.appendChild(waveLabel);

                ['sawtooth', 'square', 'sine', 'triangle'].forEach(w => {
                    const waveSymbols = { sawtooth: '⩘', square: '⊓', sine: '∿', triangle: '△' };
                    const btn = document.createElement('button');
                    btn.className = `px-2 py-1 text-xs rounded-lg transition-all ${
                        state.bassWave === w
                            ? 'text-emerald-300 border border-emerald-500/50'
                            : 'text-slate-400 border border-slate-700/50 hover:bg-slate-700/60'
                    }`;
                    btn.style.background = state.bassWave === w ? 'rgba(16,185,129,0.2)' : 'rgba(30,41,59,0.6)';
                    btn.textContent = (waveSymbols[w] || '') + ' ' + w.slice(0, 3);
                    btn.addEventListener('click', () => updateBassWave(w));
                    bassControls.appendChild(btn);
                });

                // Separator
                const bSep2 = document.createElement('div');
                bSep2.className = 'w-px h-4 bg-slate-700';
                bassControls.appendChild(bSep2);

                // Octave selector
                const octLabel = document.createElement('span');
                octLabel.className = 'text-xs text-slate-400';
                octLabel.textContent = 'Oct:';
                bassControls.appendChild(octLabel);

                [1, 2, 3].forEach(oct => {
                    const btn = document.createElement('button');
                    btn.className = `px-2 py-1 text-xs rounded-lg transition-all ${
                        state.bassOctave === oct
                            ? 'text-emerald-300 border border-emerald-500/50'
                            : 'text-slate-400 border border-slate-700/50 hover:bg-slate-700/60'
                    }`;
                    btn.style.background = state.bassOctave === oct ? 'rgba(16,185,129,0.2)' : 'rgba(30,41,59,0.6)';
                    btn.textContent = oct;
                    btn.addEventListener('click', () => updateBassOctave(oct));
                    bassControls.appendChild(btn);
                });

                // Separator
                const bSep3 = document.createElement('div');
                bSep3.className = 'w-px h-4 bg-slate-700';
                bassControls.appendChild(bSep3);

                // Pattern presets
                const bPatLabel = document.createElement('span');
                bPatLabel.className = 'text-xs text-slate-400';
                bPatLabel.textContent = 'Pattern:';
                bassControls.appendChild(bPatLabel);

                Object.keys(BASS_PRESETS).forEach(name => {
                    const btn = document.createElement('button');
                    btn.className = `px-2.5 py-1 text-xs rounded-lg transition-all ${
                        state.bassPattern === name
                            ? 'text-emerald-300 border border-emerald-500/50'
                            : 'text-slate-400 border border-slate-700/50 hover:bg-slate-700/60'
                    }`;
                    btn.style.background = state.bassPattern === name ? 'rgba(16,185,129,0.2)' : 'rgba(30,41,59,0.6)';
                    btn.textContent = name;
                    btn.addEventListener('click', () => loadBassPreset(name));
                    bassControls.appendChild(btn);
                });

                bassDiv.appendChild(bassControls);

                // Grid
                const bassGridEl = document.createElement('div');
                bassGridEl.className = 'flex gap-px';

                // Note labels (reversed so low notes at bottom)
                const noteLabels = document.createElement('div');
                noteLabels.className = 'flex flex-col gap-px mr-1';
                const noteColors = { C: '#10b981', D: '#34d399', E: '#6ee7b7', F: '#2dd4bf', G: '#14b8a6', A: '#0d9488', B: '#0f766e' };
                state.bassNotes.slice().reverse().forEach(note => {
                    const lbl = document.createElement('div');
                    lbl.className = 'h-6 flex items-center justify-end pr-1.5';
                    lbl.innerHTML = `<span class="text-xs font-mono" style="color:${noteColors[note] || '#10b981'}">${note}</span>`;
                    noteLabels.appendChild(lbl);
                });
                bassGridEl.appendChild(noteLabels);

                // Cells
                const reversedNotes = state.bassNotes.slice().reverse();
                for (let col = 0; col < state.gridSteps; col++) {
                    const colDiv = document.createElement('div');
                    colDiv.className = 'flex flex-col gap-px flex-1';
                    for (let ri = 0; ri < reversedNotes.length; ri++) {
                        const actualRow = state.bassNotes.length - 1 - ri;
                        const cell = document.createElement('button');
                        cell.className = 'h-6 rounded-sm';
                        cell.dataset.bassCell = '1';
                        cell.dataset.bassRow = actualRow;
                        cell.dataset.bassCol = col;
                        cell.dataset.bassNote = state.bassNotes[actualRow];
                        const isActive = state.bassGrid[actualRow][col];
                        const isCurrent = state.bassStep === col && state.bassPlaying;
                        const color = noteColors[reversedNotes[ri]] || '#10b981';
                        cell.style.background = isActive
                            ? isCurrent ? color : color + '88'
                            : isCurrent ? '#1e293b' : '#0f172a';
                        cell.style.border = `1px solid ${isCurrent ? color + '44' : '#1e293b'}`;
                        cell.style.boxShadow = isActive && isCurrent ? `0 0 8px ${color}88` : 'none';
                        cell.addEventListener('click', () => toggleBassCell(actualRow, col));
                        colDiv.appendChild(cell);
                    }
                    bassGridEl.appendChild(colDiv);
                }

                bassDiv.appendChild(bassGridEl);
                bassContainer.appendChild(bassDiv);
            }
        }

        // Initial render
        render();
    </script>
</body>
</html>
